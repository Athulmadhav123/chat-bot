<!DOCTYPE html>
<html>

<head>
    <title>AI Customer Support Bot</title>
</head>

<body>

    <h1>Customer Support Bot</h1>

    <form method="POST">

        <input
            type="text"
            name="query"
            placeholder="Ask your question"
            style="width:300px;"
        >

        <button type="submit">
            Ask
        </button>

    </form>

    <h3>Response:</h3>

    <p>{{ answer }}</p>

</body>

</html>
